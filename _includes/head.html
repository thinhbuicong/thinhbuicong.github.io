<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}">

<!-- Link Font Awesome (nếu muốn icon) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

<!-- Giao diện CSS (giống “Coder theme” tối giản) -->
<!-- Giả sử bạn tự tạo file coder.min.css & coder-dark.min.css trong /assets/css. 
     Hoặc bạn tùy biến SCSS, theme. Ở đây tạm dẫn link "giả" -->
<link rel="stylesheet" href="{{ '/assets/css/coder.min.css' | relative_url }}" media="screen">
<link rel="stylesheet" href="{{ '/assets/css/coder-dark.min.css' | relative_url }}" media="screen">

<!-- Cookie consent (nếu cần) ...
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.css"/>
-->

<!-- Thêm favicon nếu có -->
<link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
